<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Editor</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
    <style>
        /* styles.css */

body, html {
    height: 100%;
    margin: 0;
    font-family: Arial, sans-serif;
}

.container-fluid {
    height: 100%;
    display: flex;
    flex-direction: column;
}

.toolbar {
    background-color: #ffffff;
    z-index: 2;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
}

.pdf-viewer {
    flex-grow: 1;
    background-color: #e5e5e5;
    display: flex;
    justify-content: center;
    align-items: center;
}

.pdf-page {
    width: 80%;
    height: 100%;
    background-color: white;
    border: 1px solid #ccc;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 20px 0;
}
.logo img
{
    height: 4rem;
    width: 4rem;
}
.btn-show-pages
{
    background-color: white;
    border: 0.3px solid rgb(207, 207, 207);
    border-radius: 5px;
    margin: 0 1.5rem;
}
.btn-show-pages img
{
    height: 2.5rem;
    width: 2.5rem;
}
.btn-outline-secondary img
{
    height: 1.5rem;
    width: 1.5rem;
}
.btn {
    --bs-btn-padding-x: 0.5rem;
    --bs-btn-padding-y: 0.3rem;
}
.btn-outline-secondary 
{
    --bs-btn-color: #6c757d;
    --bs-btn-border-color: #cecece;
    --bs-btn-hover-color: #fff;
    --bs-btn-hover-bg: #cfcfcf;
    --bs-btn-hover-border-color: #6c757d;
}
.draw
{
    margin: 0 4rem;
}  

#myColor {
  width: 2rem;   
  height: 2rem;  
  border-radius: 50%;  
  padding: 0;    
  border: 1px solid #dfdfdf; 
  cursor: pointer;  
}

    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <!-- Toolbar -->
        <div class="shadow d-flex align-items-center toolbar p-2">
            <a href="">
                <div class="logo">
                    <img src="../assets/images/Logo.png" alt="">
                </div>
            </a>
            <div class="btn-show-pages" ><img src="../assets/images/show pages.png" alt=""></div>
            
            
            <div class="draw">
                <div class="btn-group" role="group" id="pen" >
                    <button type="button" class="btn btn-outline-secondary">
                        <img src="../assets/images/draw-icon.png" alt="">
                    </button>
                    <button type="button" class="btn btn-outline-secondary">
                        <img src="../assets/images/save-draws.png" alt="">
                    </button>
                    <button type="button" class="btn btn-outline-secondary">
                        <img src="../assets/images/reload.png" alt="">
                    </button>
                  </div>
                  <div class="text-center">
                    <span style="font-weight: 700;">Drawing</span>
                  </div>
            </div>


            <div>
                <form>
                    <input type="color" class="form-control form-control-color" id="myColor" value="#D251C7" title="Choose a color">
                  </form>
            </div>
        </div>

        <!-- PDF Viewer -->
        <div class="pdf-viewer">
            <div class="pdf-page">Page 1 content goes here</div>
        </div>
    </div>

    
     <!-- Thêm đoạn JavaScript này trong file HTML trước thẻ đóng  -->
    <script>
        document.querySelector('.btn-light:contains("Save")').addEventListener('click', function() {
            alert('Save button clicked!');
        });
    </script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
