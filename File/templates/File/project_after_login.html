{% extends "File/base.html" %}
    {% load static %}
    {% block content %}
    <link rel="stylesheet" href="{% static 'css/project.css' %}">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <link rel="stylesheet" href="{% static 'css/list_files.css' %}">
    <div class="pdf-container">
        {% for file in files %}
            <div class="pdf-item" id="pdf-item-{{ file.id }}">
                <a href="{% url 'File:edit_file' file.id %}">
                    <canvas id="canvas-{{ file.id }}"></canvas>
                </a>
                <p hidden>{{file.file.url}}</p>
    
            </div>
    
        {% endfor %}
    </div>
    <div class="d-flex" id="wrapper">
        <!-- Sidebar-->
        <div class="border-end sidebar" id="sidebar-wrapper"></div>
        <div id="page-content-wrapper">
            <div class="topnav-after-login"></div>
            <div class="container-fluid pt-3">
                <div class="root">
   
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    
    <script src="{% static 'js/list_files.js' %}"></script>
    <script type="text/babel" src="{% static 'js/project.js' %}"></script>
    <script type="text/babel" src="{% static 'js/menu.js' %}"></script>
    <script type="text/babel" src="{% static 'js/content.js' %}"></script>
{% endblock content %}
