{% extends 'File/base.html' %}
{% block content %}
{% load static %}
<style>
    .pdfCanvas {
        border: 1px solid #000;
        cursor: move;
        margin-bottom: 20px;
    }
    .textBox {
        position: absolute;
        border: 1px dashed #000;
        padding: 5px;
        display: none;
        resize: both;
        overflow: auto;
    }
    canvas {
        background-color: aqua;
        margin-left: 20vw;
    }
</style>
    <div id="tools_list">
        <div class="draw">
            <button id="pen">Pen</button>
            <button id="saveDrawing">Save Drawing</button>
            <button id="redraw">Redraw</button>
        </div>
        <hr>
        <div class="write">
            <button id="add_text">Add Text</button>
            {% comment %} <input type="number" id="fontSize" placeholder="Font Size" value="12">
            <input type="color" id="fontColor" value="#000000">    {% endcomment %}
            <button id="readdtext">Readdtext</button>
            <button type="button" id="save_add_text">Save</button>
        </div>
        <hr>
        <div class="restore">
            <button onclick="undo_canvas()" id="undo">Undo canvas</button>
            <button onclick="undo_html()" id="undo">Undo html</button>
            <button onclick="clear_canvas()" id="clear">Clear</button>
        </div>
        <hr>
        <button id="save_all_changes">Save All</button>
    </div>
    <p id="file_id" style="opacity: 0;">{{file.id}}</p>
    <p id="file_path" style="display: none;">{{file_path}}</p>
    <div id="pdfContainer">
{% comment %} 
        {% for textbox in textboxs %}
             <div class="textBox" contenteditable="true" id="{{textbox.item_id}}" style="position: absolute; display: block; left: {{textbox.coord_in_doc_X}}px; top: {{textbox.coord_in_doc_Y}}px;">{{textbox.content}}</div>
        {% endfor %} {% endcomment %}
    </div>
   
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="{% static 'js/render_pages.js' %}"></script>

    <script src="{% static 'js/draw.js' %}"></script> 
    <script src="{% static 'js/add_text.js' %}"></script>
    <script src="{% static 'js/undo_clear.js' %}"></script>

{% endblock content %}
