{% extends 'File/base.html' %}
{% block content %}
{% load static %}
<style>
    #pdfCanvas {
        border: 1px solid #000;
        cursor: move;
    }
    .textBox {
        position: absolute;
        border: 1px dashed #000;
        padding: 5px;
        display: none;
        resize: both;
        overflow: auto;
    }
    canvas {
        background-color: aqua;
    }
</style>
    <div id="tools_list">
        <div class="draw">
            <button id="pen">Pen</button>
            <button id="saveDrawing">Save Drawing</button>
            <button id="redraw">Redraw</button>
        </div>
        <hr>
        <div class="write">
            <button id="add_text">Add Text</button>
            <input type="number" id="fontSize" placeholder="Font Size" value="12">
            <input type="color" id="fontColor" value="#000000">   
            <button type="button" id="save_add_text">Save</button>
        </div>
        <hr>
        <div class="restore">
            <button onclick="undo_canvas()" id="undo">Undo canvas</button>
            <button onclick="undo_html()" id="undo">Undo html</button>
            <button onclick="clear_canvas()" id="clear">Clear</button>
        </div>
    </div>
    <p id="file_id" style="opacity: 0;">{{file.id}}</p>
    <p id="file_path" style="display: none;">{{file_path}}</p>
    <canvas id="pdfCanvas"></canvas>
    
  
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    {% comment %} <script src="https://cdn.jsdelivr.net/npm/pdf-lib/dist/pdf-lib.min.js"></script> {% endcomment %}
    <script>
        var canvas = $('#pdfCanvas')[0];
        var ctx = canvas.getContext('2d');
        var pdfDocument = null;
        var currentPage = 1;
        var file_path = $("#file_path").text()
        
        $.ajax({
            type: "GET",
            url: `http://127.0.0.1:8000/media/${file_path}`,
            xhrFields: {
                responseType: 'arraybuffer'
            },
            success: function (pdfResponse) {
                var typedArray = new Uint8Array(pdfResponse);
                pdfjsLib.getDocument(typedArray).promise.then(function(pdf) {
                    pdfDocument = pdf;
                    renderPage(currentPage);
                }).catch(function(error) {
                    console.error('Error loading PDF:', error);
                });
            },
            error: function (jqXHR, textStatus, errorThrown) {
                console.error('Error during AJAX request for PDF:', textStatus, errorThrown);
            }
        });
        // Render Page
        function renderPage(num) {
            pdfDocument.getPage(num).then(function(page) {
                var viewport = page.getViewport({ scale: 1 });
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                var renderContext = {
                    canvasContext: ctx,
                    viewport: viewport
                };
                console.log(page)
                page.render(renderContext).promise.then(function() {
                    // Redraw saved drawings after rendering page
             //       redraw();
                });
            });
        }
    </script>
    <script src="{% static 'js/draw.js' %}"></script> 
    <script src="{% static 'js/add_text.js' %}"></script>
    <script src="{% static 'js/undo_clear.js' %}"></script>
{% endblock content %}
