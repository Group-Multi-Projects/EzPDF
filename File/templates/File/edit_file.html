<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    {% load static %}
<link rel="stylesheet" href="{% static 'css/edit_file.css' %}">

</head>
<body>
    <p id="user-token" hidden>{{access}}</p>

    <div id="tools_list">
        <div class="draw">
            <button id="pen" style="background-color: ">Pen</button>

        </div>
        <hr>
        <div class="write">
            <button id="add_text">Add Text</button>
        </div>
        <hr>
        <div>
            <label for="add_image">Add Image:</label>
            <input type="file" id="add_image" name="add_image">
        </div>
        <hr>
        <div class="add_shapes">
            <div class="button_shape circle" name = "circle"></div>
            <div class="button_shape square" name = "square"></div>
            <div class="button_shape rectangle" name = "rectangle"></div>
            <div class="button_shape triangle" name = "triangle"></div>
            
        </div>
        <hr>
        <hr>
        <button id="save_all_changes">Save All</button>
    </div>
    <p id="file_id" style="display: none;">{{file.id}}</p>
    <p id="file_path" style="display: none;">{{file_path}}</p>
    <p id="num_pages" style="display: none;">{{num_pages}}</p>
    <div id="pdfContainer" style=""></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/4.4.0/fabric.min.js"></script>
<script src="{% static 'js/render_pages2.js' %}"></script>
<script src="{% static 'js/draw2.js' %}"></script> 
<script src="{% static 'js/add_text2.js' %}"></script>
<script src="{% static 'js/add_image2.js' %}"></script>
<script src="{% static 'js/add_shapes2.js' %}"></script>
 
</body>
</html>
