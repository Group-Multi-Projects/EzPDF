<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/navbar.css' %}">
</head>
<body>
    <div class="container">
        <div class="navbar">
            <ul>
                <li><a href="{% url 'File:home' %}">Home</a></li>
                {% if request.user.is_authenticated %}
                <li>{{request.user.username}}<a href="{% url 'Account:signout' %}">Sign Out</a></li>

                {% endif %}            
                <li><a href="{% url 'File:list_files' %}">List Files Here</a></li>
                <li><a href="{% url 'File:upload_file' %}">Upload File Here</a></li>
            </ul>
        </div>  
        {% block content %}
            
        {% endblock content %}
    </div>
</body>
</html>
