<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>Chế Độ Vẽ với Fabric.js</title>
    <!-- Tải thư viện Fabric.js từ CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/4.4.0/fabric.min.js"></script>
    <style>
        canvas {
            border: 1px solid #000;
        }
        .controls {
            margin-bottom: 10px;
        }
        .controls > * {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="controls">
        <button id="toggleDrawingMode">Tắt Chế Độ Vẽ</button>
        <label for="colorPicker">Màu Bút:</label>
        <input type="color" id="colorPicker" value="#000000">
        <label for="brushSize">Kích Thước Bút:</label>
        <input type="range" id="brushSize" min="1" max="50" value="5">
        <button id="clearCanvas">Xóa Canvas</button>
    </div>
    <canvas id="fabricCanvas" width="800" height="600"></canvas>

    <script>
        // Khởi tạo canvas Fabric.js
        var canvas = new fabric.Canvas('fabricCanvas');

        // Bật chế độ vẽ
        canvas.isDrawingMode = true;

        // Lấy các phần tử DOM
        var toggleDrawingModeBtn = document.getElementById('toggleDrawingMode');
        var colorPicker = document.getElementById('colorPicker');
        var brushSize = document.getElementById('brushSize');
        var clearCanvasBtn = document.getElementById('clearCanvas');

        // Thiết lập mặc định cho bút vẽ
        canvas.freeDrawingBrush = new fabric.PencilBrush(canvas);
        canvas.freeDrawingBrush.color = colorPicker.value;
        canvas.freeDrawingBrush.width = parseInt(brushSize.value, 10) || 1;

        // Sự kiện thay đổi màu bút
        colorPicker.addEventListener('change', function() {
            if (!(canvas.freeDrawingBrush instanceof fabric.EraserBrush)) {
                canvas.freeDrawingBrush.color = this.value;
            }
        });

        // Sự kiện thay đổi kích thước bút
        brushSize.addEventListener('change', function() {
            canvas.freeDrawingBrush.width = parseInt(this.value, 10) || 1;
        });

        // Sự kiện bật/tắt chế độ vẽ
        toggleDrawingModeBtn.addEventListener('click', function() {
            canvas.isDrawingMode = !canvas.isDrawingMode;
            this.textContent = canvas.isDrawingMode ? 'Tắt Chế Độ Vẽ' : 'Bật Chế Độ Vẽ';
        });


        // Sự kiện xóa canvas
        clearCanvasBtn.addEventListener('click', function() {
            canvas.clear();
            // Sau khi xóa, cần bật lại chế độ vẽ và thiết lập lại màu và kích thước bút
            canvas.isDrawingMode = true;
            canvas.freeDrawingBrush = new fabric.PencilBrush(canvas);
            canvas.freeDrawingBrush.color = colorPicker.value;
            canvas.freeDrawingBrush.width = parseInt(brushSize.value, 10) || 1;
            toggleDrawingModeBtn.textContent = 'Tắt Chế Độ Vẽ';
        });
    </script>
</body>
</html>
